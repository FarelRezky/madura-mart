version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maduramart_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=madura_mart
      - DB_USERNAME=root
      - DB_PASSWORD=rahasia
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
      # [KUNCI 3] Memerintahkan Laravel mempercayai header dari Nginx Load Balancer
      - TRUSTED_PROXIES=*
      # [KUNCI 4] Mengamankan cookie session agar sinkron dengan HTTPS
      - SESSION_SECURE_COOKIE=true
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: maduramart_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./nginx-container.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mariadb:10.11
    container_name: maduramart_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: madura_mart
      MYSQL_ROOT_PASSWORD: rahasia
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: